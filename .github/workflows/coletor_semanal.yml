name: Coletor Meteorológico Semanal

on:
  # Executa todos os sábados às 09:00 UTC = 06:00 BRT
  schedule:
    - cron: "0 9 * * 6"

  # Permite executar manualmente pelo GitHub Actions
  workflow_dispatch:

jobs:
  coletar:
    name: Coletar e Registrar Dados INMET
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Python 3.12
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Instala as dependências
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # 4. Executa o agente
      # As variáveis secretas são configuradas em:
      # GitHub → Settings → Secrets and variables → Actions
      - name: Executar agente meteorológico
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py
